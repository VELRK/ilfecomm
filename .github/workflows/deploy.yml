name: Auto Deploy Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY_ILF }}
          port: 65002
          script: |
            TARGET=/home/u221026474/domains/indianladiesfashion.com/public_html
            if [ -d "$TARGET/.git" ]; then
              cd $TARGET
              git pull origin main
            else
              git clone https://github.com/VELRK/ilfecomm.git $TARGET
            fi
